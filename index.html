<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente de Equipaje | El Podcast</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #FF6B6B, #FFD93D);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #FFFFFF;
            text-align: center;
            padding: 30px 20px;
        }

        .container { max-width: 650px; width: 100%; }

        .podcast-tag {
            display: inline-block;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.15);
            padding: 6px 18px;
            border-radius: 50px;
            margin-bottom: 15px;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 3.8rem;
            font-weight: 900;
            margin-bottom: 30px;
            letter-spacing: -1.5px;
            line-height: 1.05;
            text-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .quote-block { font-size: 1.4rem; font-weight: 300; line-height: 1.6; margin-bottom: 35px; }
        .line { display: block; margin-bottom: 10px; }
        .line-bold { display: block; font-weight: 600; font-size: 1.5rem; }

        .status {
            display: inline-block;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 50px;
            margin-bottom: 35px;
        }

        /* --- ESTILO DEL BOTÓN TYPEFORM --- */
        .notify-button {
            display: inline-block;
            background: #2D2D2D;
            color: #FFF;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .notify-button:hover {
            transform: scale(1.05);
            background: #000;
        }

        .social-links { display: flex; justify-content: center; gap: 30px; margin-top: 40px; }
        .social-links a { color: #FFF; font-size: 1.8rem; transition: 0.3s; }
        .social-links a:hover { transform: translateY(-4px); color: #2D2D2D; }

        @media (max-width: 600px) {
            h1 { font-size: 2.6rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="podcast-tag">El Podcast</div>
        <h1>Mente de Equipaje</h1>
        
        <div class="quote-block">
            <span class="line">Historias, reflexiones y todo eso que decidimos cargar (o soltar) al caminar.</span>
            <span class="line-bold">El podcast que le pone nombre a lo que pensamos.</span>
        </div>

        <div class="status">Preparando el equipaje — Próximamente</div>

        <!-- Botón que abre tu Typeform -->
        <a href="https://form.typeform.com/to/nCekVUc0" target="_blank" class="notify-button">
            Avísame al despegue
        </a>

        <div class="social-links">
            <a href="https://instagram.com/mentedeequipaje" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://youtube.com/@mentedeequipaje" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="mailto:mentedeequipaje@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

</body>
</html>
