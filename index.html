<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente de Equipaje</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            /* Quitamos overflow: hidden para permitir el scroll si fuera necesario */
            background-color: #000;
            
            /* Aplicamos el fondo directamente al body */
            background-image: url('background.png');
            background-size: cover;          /* La imagen se estira/encoge para cubrir todo */
            background-position: center;     /* Siempre centrada */
            background-repeat: no-repeat;
            background-attachment: fixed;    /* El fondo se queda fijo al hacer scroll */
        }
    </style>
</head>
<body>
    </body>
</html>
