<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente de Equipaje | El Podcast</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Degradado de alta energía */
            background: linear-gradient(135deg, #FF6B6B, #FFD93D);
            font-family: 'Inter', system-ui, sans-serif;
            color: #FFFFFF;
            text-align: center;
            padding: 20px;
        }

        .container { max-width: 600px; }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 30px;
            letter-spacing: -2px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .quote-block {
            font-size: 1.5rem;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .line {
            display: block;
            margin-bottom: 15px;
        }

        .status {
            display: inline-block;
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            padding: 10px 25px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50px;
            margin-bottom: 40px;
        }

        .social-links { display: flex; justify-content: center; gap: 30px; }
        .social-links a { color: #FFF; font-size: 1.8rem; transition: 0.3s; }
        .social-links a:hover { transform: translateY(-5px); color: #4A0E0E; }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .quote-block { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mente de Equipaje | El Podcast</h1>
        
        <div class="quote-block">
            <span class="line">Historias, reflexiones y todo eso que decidimos cargar (o soltar) al caminar.</span>
            <span class="line" style="font-weight: 600;">El podcast que le pone nombre a lo que pensamos.</span>
        </div>

        <div class="status">Preparando el equipaje — Próximamente</div>

        <div class="social-links">
            <a href="https://instagram.com/mentedeequipaje" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://tiktok.com/@mentedeequipaje" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://youtube.com/@mentedeequipaje" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="mailto:mentedeequipaje@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

</body>
</html>
